{% extends "base.html" %}

{% block title %}Something Went Wrong | InsightCare AI{% endblock %}

{% block content %}
<section class="pt-12 sm:pt-16">
    <div class="shell-container">
        <div class="mx-auto max-w-3xl surface-card rounded-[2rem] p-8 text-center sm:p-12">
            <div class="mx-auto inline-flex h-16 w-16 items-center justify-center rounded-3xl bg-rose-50 text-rose-500">
                <i class="fa-solid fa-triangle-exclamation text-2xl"></i>
            </div>
            <h1 class="mt-6 font-display text-4xl font-semibold text-slate-950">We hit an application error.</h1>
            <p class="mt-4 text-base leading-7 text-slate-600">
                {{ message or "Please try the flow again with a valid image or corrected input values." }}
            </p>
            <div class="mt-8 flex flex-wrap justify-center gap-4">
                <a href="{{ url_for('upload_report') }}" class="button-primary">
                    <i class="fa-solid fa-arrow-rotate-right"></i>
                    Return To Upload
                </a>
                <a href="{{ url_for('home') }}" class="button-ghost">
                    <i class="fa-solid fa-house"></i>
                    Home
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
